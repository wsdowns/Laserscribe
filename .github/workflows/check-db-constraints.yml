name: Check Database Constraints

on:
  workflow_dispatch:
    inputs:
      db_password:
        description: 'MySQL root password'
        required: true
        type: string

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LIGHTSAIL_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.LIGHTSAIL_HOST }} >> ~/.ssh/known_hosts

      - name: Check database constraints and indexes
        env:
          HOST: ${{ secrets.LIGHTSAIL_HOST }}
          USER: ${{ secrets.LIGHTSAIL_USER }}
          DB_PASSWORD: ${{ inputs.db_password }}
        run: |
          ssh $USER@$HOST << EOF
            echo "=== Settings table indexes and constraints ==="
            mysql -u root -p'$DB_PASSWORD' -e "SHOW INDEX FROM laserscribe.settings;"

            echo ""
            echo "=== Check for unique constraint ==="
            mysql -u root -p'$DB_PASSWORD' -e "
              SELECT INDEX_NAME, NON_UNIQUE, COLUMN_NAME
              FROM INFORMATION_SCHEMA.STATISTICS
              WHERE TABLE_SCHEMA = 'laserscribe'
              AND TABLE_NAME = 'settings'
              AND INDEX_NAME LIKE '%user%material%' OR INDEX_NAME LIKE '%uq_%';
            "

            echo ""
            echo "=== Count of settings in database ==="
            mysql -u root -p'$DB_PASSWORD' -e "SELECT COUNT(*) as total_settings FROM laserscribe.settings;"

            echo ""
            echo "=== Settings by user ==="
            mysql -u root -p'$DB_PASSWORD' -e "
              SELECT u.email, COUNT(s.id) as setting_count
              FROM laserscribe.users u
              LEFT JOIN laserscribe.settings s ON u.id = s.user_id
              GROUP BY u.id;
            "
          EOF
