name: Run Database Migration

on:
  workflow_dispatch:
    inputs:
      db_password:
        description: 'MySQL root password'
        required: true
        type: string

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LIGHTSAIL_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.LIGHTSAIL_HOST }} >> ~/.ssh/known_hosts

      - name: Run migration
        env:
          HOST: ${{ secrets.LIGHTSAIL_HOST }}
          USER: ${{ secrets.LIGHTSAIL_USER }}
          DEPLOY_PATH: ${{ secrets.LIGHTSAIL_DEPLOY_PATH }}
          DB_PASSWORD: ${{ inputs.db_password }}
        run: |
          # Copy migration script
          scp backend/migrate.sql $USER@$HOST:~/migrate.sql

          # Run migration
          ssh $USER@$HOST << EOF
            echo "Running database migration..."
            mysql -u root -p'$DB_PASSWORD' < ~/migrate.sql
            echo "Migration completed!"
          EOF

      - name: Verify migration
        env:
          HOST: ${{ secrets.LIGHTSAIL_HOST }}
          USER: ${{ secrets.LIGHTSAIL_USER }}
          DB_PASSWORD: ${{ inputs.db_password }}
        run: |
          ssh $USER@$HOST << EOF
            echo "Verifying users table structure..."
            mysql -u root -p'$DB_PASSWORD' -e "DESCRIBE laserscribe.users;"
            echo ""
            echo "Verifying settings table structure..."
            mysql -u root -p'$DB_PASSWORD' -e "DESCRIBE laserscribe.settings;"
          EOF
