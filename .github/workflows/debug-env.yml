name: Debug Environment Loading

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LIGHTSAIL_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.LIGHTSAIL_HOST }} >> ~/.ssh/known_hosts

      - name: Debug environment
        env:
          HOST: ${{ secrets.LIGHTSAIL_HOST }}
          USER: ${{ secrets.LIGHTSAIL_USER }}
          DEPLOY_PATH: ${{ secrets.LIGHTSAIL_DEPLOY_PATH }}
        run: |
          ssh $USER@$HOST << EOF
            echo "=== Backend process info ==="
            ps aux | grep laserscribe-api | grep -v grep
            echo ""
            echo "=== DEPLOY_PATH ==="
            echo "$DEPLOY_PATH"
            echo ""
            echo "=== .env file location ==="
            ls -la ~/.env
            echo ""
            echo "=== .env contents ==="
            cat ~/.env
            echo ""
            echo "=== Check if API key is set in process ==="
            sudo cat /proc/\$(pgrep laserscribe-api)/environ | tr '\0' '\n' | grep SMTP2GO || echo "Not found in process environment"
          EOF
