name: Check Materials Table

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LIGHTSAIL_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.LIGHTSAIL_HOST }} >> ~/.ssh/known_hosts

      - name: Check materials table
        env:
          HOST: ${{ secrets.LIGHTSAIL_HOST }}
          USER: ${{ secrets.LIGHTSAIL_USER }}
        run: |
          ssh $USER@$HOST << EOF
            echo "=== Materials table count ==="
            sudo mysql -u root -e "SELECT COUNT(*) as material_count FROM laserscribe.materials;"

            echo ""
            echo "=== List all materials ==="
            sudo mysql -u root -e "SELECT id, name, category_id FROM laserscribe.materials LIMIT 20;"

            echo ""
            echo "=== Check if materials table is empty ==="
            sudo mysql -u root -e "SELECT IF((SELECT COUNT(*) FROM laserscribe.materials) = 0, 'EMPTY - THIS IS THE PROBLEM!', 'Materials exist') as status;"
          EOF
