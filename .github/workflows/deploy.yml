name: Deploy to Lightsail

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: backend/go.sum

      - name: Build backend
        working-directory: ./backend
        run: |
          go mod download
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -o laserscribe-api main.go
          chmod +x laserscribe-api

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LIGHTSAIL_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.LIGHTSAIL_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Lightsail
        env:
          HOST: ${{ secrets.LIGHTSAIL_HOST }}
          USER: ${{ secrets.LIGHTSAIL_USER }}
          DEPLOY_PATH: ${{ secrets.LIGHTSAIL_DEPLOY_PATH }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
        run: |
          # Create .env file
          cat > .env.tmp << EOF
          # JWT
          JWT_SECRET=$JWT_SECRET

          # SMTP (email verification)
          SMTP_HOST=$SMTP_HOST
          SMTP_PORT=$SMTP_PORT
          SMTP_USER=$SMTP_USER
          SMTP_PASS=$SMTP_PASS
          SMTP_FROM=$SMTP_FROM

          # App
          APP_BASE_URL=$APP_BASE_URL
          EOF

          # Deploy backend
          ssh $USER@$HOST "mkdir -p $DEPLOY_PATH"
          scp backend/laserscribe-api $USER@$HOST:~/
          scp backend/schema.sql $USER@$HOST:~/
          scp backend/migrate.sql $USER@$HOST:~/ || true
          scp .env.tmp $USER@$HOST:~/.env
          ssh $USER@$HOST "mv ~/laserscribe-api $DEPLOY_PATH/ && mv ~/schema.sql $DEPLOY_PATH/ && mv ~/migrate.sql $DEPLOY_PATH/ 2>/dev/null || true"

          # Deploy frontend
          ssh $USER@$HOST "mkdir -p /tmp/frontend-dist && sudo mkdir -p /var/www/html.new"
          scp -r frontend/dist/* $USER@$HOST:/tmp/frontend-dist/
          ssh $USER@$HOST "sudo rm -rf /var/www/html.new/* && sudo mv /tmp/frontend-dist/* /var/www/html.new/"
          ssh $USER@$HOST "sudo chown -R www-data:www-data /var/www/html.new && sudo chmod -R 755 /var/www/html.new"
          ssh $USER@$HOST "sudo mv /var/www/html /var/www/html.old && sudo mv /var/www/html.new /var/www/html && sudo rm -rf /var/www/html.old"

          # Restart backend service
          ssh $USER@$HOST << EOF
            cd $DEPLOY_PATH
            chmod +x laserscribe-api
            sudo systemctl restart laserscribe
            sudo systemctl status laserscribe --no-pager
          EOF

      - name: Verify deployment
        env:
          HOST: ${{ secrets.LIGHTSAIL_HOST }}
          USER: ${{ secrets.LIGHTSAIL_USER }}
        run: |
          ssh $USER@$HOST "curl -f http://localhost:8080/api/health || exit 1"
          echo "Deployment successful!"
