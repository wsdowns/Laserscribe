name: Check Categories Table

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LIGHTSAIL_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.LIGHTSAIL_HOST }} >> ~/.ssh/known_hosts

      - name: Check categories table
        env:
          HOST: ${{ secrets.LIGHTSAIL_HOST }}
          USER: ${{ secrets.LIGHTSAIL_USER }}
        run: |
          ssh $USER@$HOST << EOF
            echo "=== Categories table count ==="
            sudo mysql -u root -e "SELECT COUNT(*) as category_count FROM laserscribe.categories;"

            echo ""
            echo "=== List all categories ==="
            sudo mysql -u root -e "SELECT * FROM laserscribe.categories;"
          EOF
