name: Setup Fresh Database

on:
  workflow_dispatch:

jobs:
  setup-db:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LIGHTSAIL_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.LIGHTSAIL_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy database setup script
        env:
          HOST: ${{ secrets.LIGHTSAIL_HOST }}
          USER: ${{ secrets.LIGHTSAIL_USER }}
          DEPLOY_PATH: ${{ secrets.LIGHTSAIL_DEPLOY_PATH }}
        run: |
          scp backend/schema.sql $USER@$HOST:~/
          scp backend/setup-db.sh $USER@$HOST:~/
          ssh $USER@$HOST "chmod +x ~/setup-db.sh"

      - name: Stop backend service
        env:
          HOST: ${{ secrets.LIGHTSAIL_HOST }}
          USER: ${{ secrets.LIGHTSAIL_USER }}
        run: |
          ssh $USER@$HOST "sudo systemctl stop laserscribe"

      - name: Setup database
        env:
          HOST: ${{ secrets.LIGHTSAIL_HOST }}
          USER: ${{ secrets.LIGHTSAIL_USER }}
          DB_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
        run: |
          ssh $USER@$HOST << EOF
            set -e
            echo "Dropping existing database..."
            echo "DROP DATABASE IF EXISTS laserscribe;" | sudo mysql -u root -p'$DB_PASSWORD' 2>/dev/null || echo "DROP DATABASE IF EXISTS laserscribe;" | sudo mysql -u root

            echo "Creating fresh database from schema..."
            sudo mysql -u root -p'$DB_PASSWORD' < ~/schema.sql 2>/dev/null || sudo mysql -u root < ~/schema.sql

            echo "Database setup complete!"
            echo "Verifying tables..."
            echo "USE laserscribe; SHOW TABLES;" | sudo mysql -u root -p'$DB_PASSWORD' 2>/dev/null || echo "USE laserscribe; SHOW TABLES;" | sudo mysql -u root
          EOF

      - name: Restart backend service
        env:
          HOST: ${{ secrets.LIGHTSAIL_HOST }}
          USER: ${{ secrets.LIGHTSAIL_USER }}
        run: |
          ssh $USER@$HOST "sudo systemctl restart laserscribe && sudo systemctl status laserscribe --no-pager"
