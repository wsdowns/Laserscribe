name: Check Database Schema

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LIGHTSAIL_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.LIGHTSAIL_HOST }} >> ~/.ssh/known_hosts

      - name: Compare schemas
        env:
          HOST: ${{ secrets.LIGHTSAIL_HOST }}
          USER: ${{ secrets.LIGHTSAIL_USER }}
        run: |
          ssh $USER@$HOST << EOF
            echo "=== Server settings table structure ==="
            sudo mysql -u root -e "DESCRIBE laserscribe.settings;"

            echo ""
            echo "=== Check for enable_dot_width_adjust column ==="
            sudo mysql -u root -e "
              SELECT COLUMN_NAME, COLUMN_TYPE, IS_NULLABLE, COLUMN_DEFAULT
              FROM INFORMATION_SCHEMA.COLUMNS
              WHERE TABLE_SCHEMA = 'laserscribe'
              AND TABLE_NAME = 'settings'
              AND COLUMN_NAME LIKE '%dot%';
            "

            echo ""
            echo "=== Check for use_dot_correction column ==="
            sudo mysql -u root -e "
              SELECT COLUMN_NAME, COLUMN_TYPE, IS_NULLABLE, COLUMN_DEFAULT
              FROM INFORMATION_SCHEMA.COLUMNS
              WHERE TABLE_SCHEMA = 'laserscribe'
              AND TABLE_NAME = 'settings'
              AND COLUMN_NAME = 'use_dot_correction';
            "

            echo ""
            echo "=== Count all columns in settings table ==="
            sudo mysql -u root -e "
              SELECT COUNT(*) as column_count
              FROM INFORMATION_SCHEMA.COLUMNS
              WHERE TABLE_SCHEMA = 'laserscribe'
              AND TABLE_NAME = 'settings';
            "
          EOF

          echo ""
          echo "=== Expected schema (from schema.sql) ==="
          grep -A 100 "CREATE TABLE settings" backend/schema.sql | grep -B 100 "^);" | head -75
