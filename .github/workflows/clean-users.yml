name: Clean Users Table

on:
  workflow_dispatch:

jobs:
  clean-users:
    runs-on: ubuntu-latest

    steps:
      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LIGHTSAIL_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.LIGHTSAIL_HOST }} >> ~/.ssh/known_hosts

      - name: Clean users table
        env:
          HOST: ${{ secrets.LIGHTSAIL_HOST }}
          USER: ${{ secrets.LIGHTSAIL_USER }}
          DB_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
        run: |
          ssh $USER@$HOST << EOF
            echo "Deleting all users..."
            echo "DELETE FROM laserscribe.users;" | sudo mysql -u root -p'$DB_PASSWORD' 2>/dev/null || echo "DELETE FROM laserscribe.users;" | sudo mysql -u root
            echo "Users table cleaned!"
          EOF
